[project]
site_name = "Computboy"
site_url = "https://computboy.github.io/"
site_description = "Graphics, AI agents, and creative systems — projects, research, and technical notes by Computboy."
site_author = "Computboy"
copyright = "Copyright &copy; 2026 Computboy. All rights reserved."

nav = [
  { "Home" = "index.md" },
  { "Projects" = [
    { "Overview" = "projects/index.md" },
    { "Realtime 3D Scene Editor" = "projects/realtime-3d-scene-editor.md" },
    { "CoDesign Agent" = "projects/codesign-agent.md" },
    { "Tiny Software Rasterizer" = "projects/tiny-software-rasterizer.md" },
    { "Mobile SR & Frame Interpolation" = "projects/mobile-sr-frame-interpolation.md" },
    { "Human Motion Generation" = "projects/human-motion-generation.md" },
  ] },
  { "Notes" = [
    { "Overview" = "notes/index.md" },
    { "Algorithms" = [
      { "Overview" = "notes/algorithms/index.md" },
      { "Data Structures" = "notes/algorithms/data-structures.md" },
      { "Problem Solving Log" = "notes/algorithms/problem-solving-log.md" },
    ] },
    { "Graphics" = [
      { "Overview" = "notes/graphics/index.md" },
      { "GAMES101" = "notes/graphics/games101.md" },
      { "OpenGL" = "notes/graphics/opengl.md" },
      { "Rendering Pipeline" = "notes/graphics/rendering-pipeline.md" },
    ] },
    { "AI" = [
      { "Overview" = "notes/ai/index.md" },
      { "CS231n" = "notes/ai/cs231n.md" },
      { "Machine Learning" = "notes/ai/machine-learning.md" },
      { "Diffusion Models" = "notes/ai/diffusion-models.md" },
    ] },
    { "HCI" = [
      { "Overview" = "notes/hci/index.md" },
      { "Interaction Design" = "notes/hci/interaction-design.md" },
    ] },
  ] },
  { "Research" = [
    { "Overview" = "research/index.md" },
    { "Mobile AI SRTP" = "research/srtp-mobile-ai.md" },
    { "Motion Generation" = "research/motion-generation.md" },
    { "Paper Reading" = "research/paper-reading.md" },
  ] },
  { "About" = "about.md" },
]

extra_css = [
  "assets/css/extra.css",
  "assets/css/custom.css",
]

[project.theme]
language = "en"
font = false
features = [
  "navigation.tabs",
  "navigation.instant",
  "navigation.tracking",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "content.code.copy",
]

[[project.theme.palette]]
scheme = "default"
primary = "black"
accent = "indigo"

[project.plugins.search]

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
